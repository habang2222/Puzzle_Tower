services:
  - type: web
    name: puzzle-tower
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUZZLE_TOWER_DATA_DIR
        value: /var/data
      - key: CLIENT_ORIGIN
        value: https://habang2222.github.io
      - key: CLIENT_URL
        value: https://habang2222.github.io/Puzzle_Tower/
    # Attach a Render Persistent Disk at /var/data to preserve users, maps, blocks, and records.
    # Render Free web services do not provide persistent disks.
    # disk:
    #   name: puzzle-tower-data
    #   mountPath: /var/data
    #   sizeGB: 1
